<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Order Confirmed | MIYAKI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="checkout.css">
</head>
<body>
    <div class="checkout-wrapper tracking-view">
        <header class="checkout-header">
            <a href="shop.html" class="logo">MIYAKI</a>
            <a href="shop.html" class="back-shop">Return to Shop</a>
        </header>

        <main class="tracking-main">
            <section class="tracking-card">
                <p class="tracking-kicker">Order Confirmed</p>
                <h1>Thank you.</h1>
                <p class="tracking-copy" id="tracking-copy">Your order has been received.</p>

                <div class="tracking-meta">
                    <div class="tracking-meta-item">
                        <span>Order ID</span>
                        <strong id="tracking-order-id">Pending</strong>
                    </div>
                    <div class="tracking-meta-item">
                        <span>Total</span>
                        <strong id="tracking-total">$0.00</strong>
                    </div>
                </div>

                <div class="tracking-actions">
                    <a href="shop.html" class="stark-btn tracking-btn">Continue Shopping</a>
                    <a href="archive.html" class="stark-btn tracking-btn tracking-btn-secondary">Visit Archive</a>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="js/main.js?v=20260429"></script>
</body>
</html>
